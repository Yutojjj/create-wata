<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="application-name" content="PromptCanvas">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PromptCanvas">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>PromptCanvas — 広告レイアウトビルダー</title>
<style>
/* ── リセット & 基盤 ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef3f8;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --surface3:#eef4fb;
  --border:#d7e0ea;
  --border2:#b8c6d8;
  --accent:#2563eb;
  --accent2:#0891b2;
  --accent-glow:rgba(37,99,235,.16);
  --orange:#f59e42;
  --orange-glow:rgba(245,158,66,.2);
  --green:#34d399;
  --red:#f87171;
  --text:#152033;
  --text2:#526173;
  --text3:#7c8a9a;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 12px 34px rgba(31,49,75,.16);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Hiragino Sans','Yu Gothic',system-ui,sans-serif;font-size:13px;line-height:1.5}

/* ── トップバー ── */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:15px;font-weight:800;letter-spacing:0;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.topbar-logo span{font-size:10px;-webkit-text-fill-color:var(--text3);font-weight:500;margin-left:6px;letter-spacing:.05em}
.topbar-sep{flex:1}
.topbar-fmt{display:flex;align-items:center;gap:8px}
.topbar-fmt label{font-size:11px;color:var(--text3);white-space:nowrap}
.topbar-fmt select{font-size:12px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer}
.topbar-btn{font-size:12px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.topbar-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--accent)}
.topbar-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-btn.primary:hover{background:#7091ff;border-color:#7091ff}
.topbar-btn.danger:hover{border-color:var(--red);color:var(--red)}
.mode-btns{display:flex;gap:4px}
.mode-btn{font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-weight:600}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.mode-btn:not(.active):hover{border-color:var(--accent);color:var(--accent)}

/* ── メインレイアウト ── */
.app{display:flex;height:calc(100vh - 52px);overflow:hidden}

/* ── 左: キャンバスエリア ── */
.canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.canvas-scroll{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px;background:linear-gradient(180deg,#f8fbff,#edf3f9)}
.canvas-wrap{border:1px solid #cbd5e1;border-radius:6px;background:#fff;overflow:hidden;box-shadow:0 16px 44px rgba(31,49,75,.18);position:relative}
canvas{display:block;cursor:crosshair}
.canvas-context-menu{position:fixed;z-index:2000;display:none;min-width:168px;padding:6px;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 16px 40px rgba(31,49,75,.22)}
.canvas-context-menu button{width:100%;border:0;background:transparent;color:var(--text);font-size:12px;text-align:left;padding:8px 10px;border-radius:6px;cursor:pointer}
.canvas-context-menu button:hover{background:rgba(37,99,235,.10);color:var(--accent)}
.canvas-context-menu .danger{color:#fca5a5}
.canvas-context-menu .danger:hover{background:rgba(248,113,113,.16);color:#fecaca}
.canvas-context-menu:not(.has-zone) .zone-only{display:none}
.zone-popover{position:fixed;z-index:2100;display:none;width:min(680px,calc(100vw - 28px));max-height:calc(100vh - 28px);overflow:auto;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 22px 60px rgba(31,49,75,.22)}
.zone-popover-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--border)}
.zone-popover-header .zone-name-input{font-size:14px}
.zone-popover-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.zone-popover-actions{display:flex;gap:8px;justify-content:flex-end;padding:10px 14px;border-top:1px solid var(--border);background:#f8fafc}
.saved-toolbar{display:flex;gap:8px;margin-bottom:12px}
.saved-toolbar input{flex:1;font-size:12px;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:#fff;color:var(--text)}
.saved-list{display:flex;flex-direction:column;gap:8px}
.saved-card{border:1px solid var(--border);border-radius:8px;background:#fff;padding:10px;box-shadow:0 4px 14px rgba(31,49,75,.06)}
.saved-card-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:3px}
.saved-card-meta{font-size:10px;color:var(--text3);margin-bottom:8px}
.saved-card-actions{display:flex;gap:6px;flex-wrap:wrap}
.saved-card-actions button{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer}
.saved-card-actions button:hover{border-color:var(--accent);color:var(--accent)}
.saved-card-actions .danger:hover{border-color:var(--red);color:var(--red)}
.canvas-hint{padding:6px 24px 10px;font-size:11px;color:var(--text3);display:flex;gap:16px}
.canvas-hint span::before{content:'•';margin-right:5px;color:var(--accent)}

/* ── 右: サイドパネル ── */
.side{width:390px;min-width:330px;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);overflow:hidden}
.side-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.side-tab{flex:1;padding:10px;font-size:12px;font-weight:600;text-align:center;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.side-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:#f4f8ff}
.side-tab:hover:not(.active){color:var(--text)}
.side-content{flex:1;overflow-y:auto;padding:12px}
.side-content::-webkit-scrollbar{width:4px}
.side-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── セクション見出し ── */
.sec-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:8px 0 6px;display:flex;justify-content:space-between;align-items:center}

/* ── 領域カード ── */
.zone-card{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;background:var(--surface);transition:border-color .2s,box-shadow .2s}
.zone-card:hover{box-shadow:0 6px 18px rgba(31,49,75,.08)}
.zone-card.emphasized{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange-glow)}
.zone-card.collapsed .zone-toggle{transform:rotate(-90deg)}
.zone-card.collapsed .zone-body{display:none}
.zone-header{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--surface2);border-bottom:1px solid var(--border)}
.zone-toggle{background:none;border:none;color:var(--text3);font-size:9px;cursor:pointer;padding:3px;transition:transform .2s;line-height:1}
.zone-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.zone-num{font-size:10px;color:var(--text3);min-width:14px}
.zone-name-input{flex:1;min-width:0;font-size:12px;font-weight:600;padding:2px 5px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text)}
.zone-name-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.zone-actions{display:flex;gap:3px;align-items:center;flex-shrink:0}
.zone-emph-btn{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.zone-emph-btn.on{background:var(--orange);color:#fff;border-color:var(--orange)}
.zone-emph-btn:not(.on):hover{border-color:var(--orange);color:var(--orange)}
.zone-del-btn{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer}
.zone-del-btn:hover{color:var(--red);border-color:var(--red)}
.zone-body{padding:8px 10px;display:flex;flex-direction:column;gap:7px}
.zone-field label{display:block;font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:600;letter-spacing:.03em}
.zone-field input,.zone-field textarea{width:100%;font-size:12px;padding:8px 9px;border-radius:6px;border:1px solid var(--border2);background:#fff;color:var(--text);resize:vertical;transition:border-color .15s,box-shadow .15s}
.zone-field textarea{min-height:68px;line-height:1.55}
.zone-field textarea[id$="-heading"]{min-height:78px}
.zone-field input:focus,.zone-field textarea:focus{box-shadow:0 0 0 3px var(--accent-glow)}
.zone-field input:focus,.zone-field textarea:focus{outline:none;border-color:var(--accent)}
.details-toggle-wrap{text-align:center}
.btn-toggle-details{background:none;border:none;color:var(--accent);font-size:10px;cursor:pointer;padding:3px 8px;border-radius:4px;font-weight:600}
.btn-toggle-details:hover{background:var(--accent-glow)}
.zone-details-area{border-top:1px dashed var(--border2);padding-top:7px;display:flex;flex-direction:column;gap:7px}

/* ── 写真アップロードエリア ── */
.photo-upload-wrap{position:relative}
.photo-drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:10px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface)}
.photo-drop-zone:hover,.photo-drop-zone.dragover{border-color:var(--accent);background:var(--accent-glow)}
.photo-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-drop-zone .drop-hint{font-size:10px;color:var(--text3)}
.photo-drop-zone .drop-hint span{color:var(--accent);font-weight:600}
.photo-preview{display:flex;align-items:center;gap:8px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 8px}
.photo-preview img{width:40px;height:40px;object-fit:cover;border-radius:4px;flex-shrink:0}
.photo-preview-info{flex:1;min-width:0}
.photo-preview-name{font-size:11px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-preview-renamed{font-size:10px;color:var(--green);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-clear-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px;flex-shrink:0}
.photo-clear-btn:hover{color:var(--red)}

/* ── 設定タブ ── */
.settings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.field select,.field input,.field textarea{width:100%;font-size:12px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text)}
.field textarea{min-height:78px;line-height:1.55;resize:vertical}
.field select:focus,.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}

/* ── プロンプト出力 ── */
.output-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px;font-size:11px;color:#a8b4d0;line-height:1.8;white-space:pre-wrap;word-break:break-all;min-height:80px;max-height:340px;overflow-y:auto;font-family:'Fira Code','Consolas',monospace}
.output-box::-webkit-scrollbar{width:4px}
.output-box::-webkit-scrollbar-thumb{background:var(--border2)}
.output-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.output-actions button{font-size:11px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-weight:600;transition:all .15s}
.output-actions button:hover{background:var(--surface3);color:var(--text)}
.output-actions .btn-zip{border-color:var(--green);color:var(--green)}
.output-actions .btn-zip:hover{background:rgba(52,211,153,.1)}
.output-actions .btn-copy-prim{background:var(--accent);border-color:var(--accent);color:#fff}
.output-actions .btn-copy-prim:hover{background:#7091ff}

/* ── テンプレ・設定パネル共通 ── */
.empty-hint{font-size:11px;color:var(--text3);padding:16px 0;text-align:center}
.btn-generate{width:100%;padding:11px;font-size:13px;font-weight:700;border-radius:var(--radius);border:none;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;margin-bottom:10px;letter-spacing:.02em;box-shadow:0 2px 16px var(--accent-glow);transition:opacity .15s}
.btn-generate:hover{opacity:.88}
.output-wrap{display:none}
.panel-sep{height:1px;background:var(--border);margin:10px 0}

/* ── テンプレートモーダル ── */
.tpl-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:2000;backdrop-filter:blur(4px)}
.tpl-modal-content{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:92%;max-width:700px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 12px 60px rgba(0,0,0,.6)}
.tpl-modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tpl-modal-header h2{font-size:14px;font-weight:700;color:var(--text)}
.btn-close-modal{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text3);transition:color .15s}
.btn-close-modal:hover{color:var(--text)}
.tpl-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;padding:0 12px;background:var(--surface)}
.tpl-tab{font-size:11px;padding:8px 14px;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;font-weight:600;transition:all .15s}
.tpl-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tpl-tab:hover:not(.active){color:var(--text)}
.tpl-body{padding:14px;overflow-y:auto;flex:1}
.tpl-body::-webkit-scrollbar{width:4px}
.tpl-body::-webkit-scrollbar-thumb{background:var(--border2)}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
.tpl-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .15s;background:var(--surface2)}
.tpl-card:hover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow);transform:translateY(-1px)}
.tpl-card .tc-genre{font-size:9px;color:var(--text3);margin-bottom:4px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tpl-card .tc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.tpl-card .tc-desc{font-size:10px;color:var(--text2);line-height:1.4;margin-bottom:6px}
.tpl-card .tc-zones{font-size:10px;color:var(--accent);font-weight:600}
.tpl-card.user-saved{border-color:var(--green)}
.tpl-card.user-saved .tc-genre{color:var(--green)}
.tpl-del-btn{float:right;font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0 0 0 6px}
.tpl-del-btn:hover{color:var(--red)}
.tpl-save-row{display:flex;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.tpl-save-row input{flex:1;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text)}
.tpl-save-row input:focus{outline:none;border-color:var(--accent)}
.tpl-save-row .btn-save-tpl{font-size:11px;padding:6px 14px;border-radius:var(--radius-sm);border:none;background:var(--green);color:#0a1a13;cursor:pointer;white-space:nowrap;font-weight:700}
.tpl-save-row .btn-save-tpl:hover{opacity:.85}
.no-tpl-hint{font-size:11px;color:var(--text3);padding:24px;text-align:center}

/* ── 詳細設定モーダル ── */
.tpl-detail-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:3000;backdrop-filter:blur(4px)}
.tpl-detail-content{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:94%;max-width:640px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 16px 80px rgba(0,0,0,.7)}
.tpl-detail-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tpl-detail-header h2{font-size:13px;font-weight:700;color:var(--text)}
.tpl-genre-badge{font-size:9px;background:rgba(91,127,255,.15);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:700;margin-left:8px;letter-spacing:.04em}
.tpl-detail-body{flex:1;overflow-y:auto;padding:14px 16px}
.tpl-detail-body::-webkit-scrollbar{width:4px}
.tpl-detail-body::-webkit-scrollbar-thumb{background:var(--border2)}
.tpl-detail-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.cfg-section{margin-bottom:16px}
.cfg-section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cfg-field{margin-bottom:10px}
.cfg-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.cfg-field input,.cfg-field textarea{width:100%;font-size:12px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);resize:vertical;transition:border-color .15s}
.cfg-field textarea{min-height:72px;line-height:1.55}
.cfg-field input:focus,.cfg-field textarea:focus{outline:none;border-color:var(--accent)}
.cfg-row{display:flex;gap:8px}
.cfg-row .cfg-field{flex:1}
.cfg-preview-bar{background:rgba(91,127,255,.08);border:1px solid rgba(91,127,255,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:11px;color:var(--accent);margin-bottom:12px}
.dyn-list{display:flex;flex-direction:column;gap:5px;margin-bottom:7px}
.dyn-item{display:flex;gap:6px;align-items:flex-start;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px}
.dyn-item.emphasized-item{border-color:var(--orange);background:rgba(245,158,66,.05)}
.dyn-item-fields{flex:1;display:flex;flex-direction:column;gap:4px}
.dyn-item-fields input,.dyn-item-fields textarea{width:100%;font-size:11px;padding:5px 7px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text)}
.dyn-item-fields textarea{min-height:58px;line-height:1.45;resize:vertical}
.dyn-item-fields input:focus,.dyn-item-fields textarea:focus{outline:none;border-color:var(--accent)}
.dyn-item-controls{display:flex;flex-direction:column;gap:3px;align-items:center;flex-shrink:0}
.dyn-emph-btn{font-size:9px;padding:3px 5px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;line-height:1.2;transition:all .15s}
.dyn-emph-btn.on{background:var(--orange);color:#fff;border-color:var(--orange)}
.dyn-del-btn{font-size:13px;background:none;border:none;color:var(--text3);cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
.dyn-del-btn:hover{color:var(--red)}
.dyn-add-btn{font-size:11px;color:var(--accent);background:none;border:1px dashed rgba(91,127,255,.4);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;width:100%;font-weight:600;transition:all .15s}
.dyn-add-btn:hover{background:var(--accent-glow);border-color:var(--accent)}
.dyn-item-num{font-size:9px;color:var(--text3);min-width:12px;text-align:center;padding-top:3px}
.cfg-emph-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.cfg-emph-toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.cfg-emph-toggle input{opacity:0;width:0;height:0}
.cfg-emph-slider{position:absolute;inset:0;background:var(--border2);border-radius:18px;cursor:pointer;transition:.2s}
.cfg-emph-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.cfg-emph-toggle input:checked + .cfg-emph-slider{background:var(--orange)}
.cfg-emph-toggle input:checked + .cfg-emph-slider:before{transform:translateX(16px)}
.cfg-emph-label{font-size:11px;color:var(--text3)}
.cfg-emph-label.on{color:var(--orange);font-weight:600}
.btn-cfg-apply{flex:1;padding:10px;font-size:13px;font-weight:700;border-radius:var(--radius-sm);border:none;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;box-shadow:0 2px 12px var(--accent-glow)}
.btn-cfg-apply:hover{opacity:.88}
.btn-cfg-back{padding:10px 16px;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.btn-cfg-back:hover{border-color:var(--text2);color:var(--text)}

/* ── ZIP進捗バッジ ── */
.zip-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:6px;padding:4px 10px;margin-top:6px}
@media(max-width:768px){.side{width:100%;border-left:none;border-top:1px solid var(--border)}.app{flex-direction:column}}
</style>
</head>
<body>

<!-- ── トップバー ── -->
<div class="topbar">
  <div class="topbar-logo">PromptCanvas <span>広告レイアウトビルダー</span></div>
  <div class="mode-btns">
    <button id="btn-draw" class="mode-btn active" onclick="setMode('draw')">✏ 描画</button>
    <button id="btn-move" class="mode-btn" onclick="setMode('move')">⤢ 移動</button>
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-fmt">
    <label>フォーマット</label>
    <select id="fmt" onchange="resizeCanvas()">
      <option value="A4v">A4縦（チラシ）</option>
      <option value="A4h">A4横</option>
      <option value="B4v">B4縦（ポスター）</option>
      <option value="B4h">B4横</option>
      <option value="poster">大判ポスター（縦）</option>
      <option value="sq">正方形（SNS）</option>
      <option value="wide">横長バナー（16:9）</option>
      <option value="story">縦長（ストーリーズ）</option>
      <option value="x_header">X ヘッダー</option>
      <option value="yt_thumb">YouTube サムネイル</option>
      <option value="card">名刺（横）</option>
    </select>
  </div>
  <button class="topbar-btn primary" onclick="saveCurrentWorkFromHeader()">保存</button>
  <button class="topbar-btn danger" onclick="clearAll()">全消去</button>
</div>

<div class="app">
  <!-- ── キャンバスエリア ── -->
  <div class="canvas-area">
    <div class="canvas-scroll">
      <div class="canvas-wrap"><canvas id="cv"></canvas></div>
      <div class="canvas-context-menu" id="canvas-context-menu">
        <button onclick="ctxDrawMode()">描画に切替</button>
        <button onclick="ctxMoveZone()">移動・サイズ変更に切替</button>
        <button class="zone-only" onclick="ctxEditZone()">領域編集</button>
        <button class="zone-only" onclick="ctxDuplicateZone()">複製</button>
        <button class="zone-only" onclick="ctxBringFront()">前面へ</button>
        <button class="zone-only" onclick="ctxSendBack()">背面へ</button>
        <button class="zone-only" onclick="ctxToggleEmph()">強調切替</button>
        <button class="zone-only danger" onclick="ctxDeleteZone()">削除</button>
      </div>
      <div class="zone-popover" id="zone-popover">
        <div class="zone-popover-header">
          <button class="zone-toggle" onclick="closeZonePopover()">×</button>
          <div class="zone-dot" id="pop-zone-dot"></div>
          <span class="zone-num" id="pop-zone-num"></span>
          <input class="zone-name-input" id="pop-zone-name" placeholder="タイトルを入力" oninput="updatePopoverZone('name',this.value)">
          <button class="zone-emph-btn" id="pop-zone-emph" onclick="togglePopoverEmph()">★</button>
        </div>
        <div class="zone-popover-body">
          <div class="zone-field"><label>見出し・テキスト</label><textarea rows="2" id="pop-zone-heading" placeholder="例: 笑顔あふれる&#10;学童クラブ" oninput="updatePopoverZone('heading',this.value)"></textarea></div>
          <div class="zone-field"><label>説明・詳細</label><textarea rows="3" id="pop-zone-description" placeholder="例: 商品特徴、価格など" oninput="updatePopoverZone('description',this.value)"></textarea></div>
          <div class="zone-field"><label>使用写真</label><div class="photo-upload-wrap" id="pop-photo-wrap"></div></div>
          <div class="zone-field"><label>画像プロンプト・補足</label><textarea rows="2" id="pop-zone-image-prompt" placeholder="例: 笑顔の子供たち、明るい教室" oninput="updatePopoverZone('image_prompt',this.value)"></textarea></div>
          <div class="zone-field"><label>補足・コンテキスト</label><textarea rows="2" id="pop-zone-context" placeholder="例: 左上位置のメインビジュアル" oninput="updatePopoverZone('context',this.value)"></textarea></div>
        </div>
        <div class="zone-popover-actions"><button class="topbar-btn" onclick="ctxMoveZone()">移動・サイズ変更</button><button class="topbar-btn danger" onclick="ctxDeleteZone()">削除</button><button class="topbar-btn primary" onclick="closeZonePopover()">閉じる</button></div>
      </div>
    </div>
    <div class="canvas-hint">
      <span>描画モード: ドラッグで領域を作成</span>
      <span>移動モード: ドラッグで移動・角ハンドルでリサイズ</span>
    </div>
  </div>

  <!-- ── サイドパネル ── -->
  <div class="side">
    <div class="side-tabs">
      <button class="side-tab active" onclick="switchTab('zones',this)">領域</button>
      <button class="side-tab" onclick="switchTab('settings',this)">設定</button>
      <button class="side-tab" onclick="switchTab('output',this)">出力</button>
      <button class="side-tab" onclick="switchTab('saved',this);renderSavedList()">保存</button>
    </div>

    <!-- 領域リストタブ -->
    <div class="side-content" id="tab-zones">
      <div class="sec-label">
        <span>領域 <span id="zone-count" style="color:var(--accent)">0</span></span>
        <div style="display:flex;gap:5px">
          <button class="topbar-btn" style="font-size:10px;padding:3px 9px" onclick="collapseAll()">全折りたたみ</button>
          <button class="topbar-btn primary" style="font-size:10px;padding:3px 9px" onclick="openTplModal()">📋 テンプレ</button>
        </div>
      </div>
      <div id="zones-list"><div class="empty-hint">キャンバスでドラッグして領域を作成してください</div></div>
    </div>

    <!-- 設定タブ -->
    <div class="side-content" id="tab-settings" style="display:none">
      <div class="sec-label">スタイル & 雰囲気</div>
      <div class="settings-grid">
        <div class="field">
          <label>スタイル</label>
          <select id="style" class="dynamic-select">
            <option value="photorealistic" data-short="写実的" data-full="写実的（本物の写真のようなリアルな仕上がり）">写実的</option>
            <option value="minimalist" data-short="ミニマル" data-full="ミニマル（余白多め・シンプル・すっきり）">ミニマル</option>
            <option value="flat" data-short="フラット" data-full="フラットデザイン（影なし・2D・アイコン的）">フラット</option>
            <option value="anime" data-short="アニメ風" data-full="アニメ風（日本のアニメ・漫画のようなイラスト）">アニメ風</option>
            <option value="vintage" data-short="ヴィンテージ" data-full="ヴィンテージ（レトロ・古い雰囲気・懐かしさ）">ヴィンテージ</option>
            <option value="modern" data-short="モダン" data-full="モダン（今風・スタイリッシュ・洗練）">モダン</option>
            <option value="watercolor" data-short="水彩画風" data-full="水彩画風（手描き感・柔らかいタッチ）">水彩画風</option>
          </select>
        </div>
        <div class="field">
          <label>照明</label>
          <select id="lighting" class="dynamic-select">
            <option value="natural" data-short="自然光" data-full="自然光（屋外の太陽光・柔らかく明るい）">自然光</option>
            <option value="studio" data-short="スタジオ" data-full="スタジオ照明（白背景・均一・商品撮影向き）">スタジオ</option>
            <option value="golden" data-short="夕暮れ" data-full="ゴールデンアワー（夕方の暖かいオレンジ光）">夕暮れ</option>
            <option value="soft" data-short="柔らかい" data-full="柔らかい光（影薄め・優しい雰囲気）">柔らかい</option>
            <option value="dramatic" data-short="ドラマティック" data-full="ドラマティック（明暗差大・インパクト重視）">ドラマティック</option>
          </select>
        </div>
        <div class="field">
          <label>色調</label>
          <select id="color" class="dynamic-select">
            <option value="warm" data-short="暖色系" data-full="暖色系（赤・オレンジ・黄色・活力感）">暖色系</option>
            <option value="cool" data-short="寒色系" data-full="寒色系（青・緑・紫・清潔感・信頼感）">寒色系</option>
            <option value="pastel" data-short="パステル" data-full="パステル（淡い・やさしい・かわいい）">パステル</option>
            <option value="mono" data-short="モノクロ" data-full="モノクロ（白黒・シック・高級感）">モノクロ</option>
            <option value="vivid" data-short="ビビッド" data-full="ビビッド（鮮やかで目立つ・高彩度）">ビビッド</option>
            <option value="contrast" data-short="高コントラスト" data-full="高コントラスト（明暗差強め・力強い印象）">高コントラスト</option>
          </select>
        </div>
        <div class="field">
          <label>構図</label>
          <select id="composition" class="dynamic-select">
            <option value="" data-short="指定なし" data-full="指定なし">指定なし</option>
            <option value="eye_level" data-short="アイレベル" data-full="アイレベル（標準的な目線）">アイレベル</option>
            <option value="close_up" data-short="クローズアップ" data-full="クローズアップ（被写体に寄る）">クローズアップ</option>
            <option value="wide_angle" data-short="広角・引き" data-full="広角・引きの絵（全体を見せる）">広角・引き</option>
            <option value="high_angle" data-short="ハイアングル" data-full="ハイアングル（見下ろす・俯瞰）">ハイアングル</option>
            <option value="low_angle" data-short="ローアングル" data-full="ローアングル（見上げる・あおり）">ローアングル</option>
          </select>
        </div>
        <div class="field">
          <label>カメラ</label>
          <select id="camera" class="dynamic-select">
            <option value="" data-short="指定なし" data-full="指定なし">指定なし</option>
            <option value="dslr" data-short="一眼レフ" data-full="一眼レフ（高品質・ボケ味）">一眼レフ</option>
            <option value="polaroid" data-short="ポラロイド" data-full="ポラロイド・チェキ風">ポラロイド</option>
            <option value="film" data-short="フィルム" data-full="フィルムカメラ風（粒状感）">フィルム</option>
            <option value="drone" data-short="ドローン" data-full="ドローン空撮風">ドローン</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>雰囲気・ターゲット（自由入力）</label>
        <textarea rows="2" id="mood" placeholder="例: 子ども向け&#10;高級感, 清潔感"></textarea>
      </div>
    </div>

    <!-- 出力タブ -->
    <div class="side-content" id="tab-output" style="display:none">
      <button class="btn-generate" onclick="generate()">▶ プロンプトを生成</button>
      <div class="output-wrap" id="output-wrap">
        <div class="output-box" id="output"></div>
        <div class="output-actions">
          <button class="btn-copy-prim" onclick="copyPrompt()">📋 コピー</button>
          <button class="btn-save-work" onclick="saveCurrentWork()">💾 保存</button>
          <button class="btn-zip" id="btn-zip" onclick="downloadZip()">📦 写真をZIPでダウンロード</button>
        </div>
        <div id="zip-status"></div>
      </div>
    </div>

    <div class="side-content" id="tab-saved" style="display:none">
      <div class="sec-label">保存履歴</div>
      <div class="saved-toolbar"><input type="text" id="save-name" placeholder="保存名 例: 春キャンペーンA案"><button class="topbar-btn primary" onclick="saveCurrentWork()">保存</button></div>
      <div class="empty-hint">領域・設定・生成済みプロンプトをこのブラウザに保存します</div>
      <div class="saved-list" id="saved-list"></div>
    </div>
  </div>
</div>

<!-- ===== テンプレートモーダル ===== -->
<div id="tpl-modal" class="tpl-modal-overlay">
  <div class="tpl-modal-content">
    <div class="tpl-modal-header">
      <h2>📋 レイアウトテンプレート</h2>
      <button class="btn-close-modal" onclick="closeTplModal()">✕</button>
    </div>
    <div class="tpl-tabs" id="tpl-tabs"></div>
    <div class="tpl-body"><div class="tpl-grid" id="tpl-grid"></div></div>
    <div class="tpl-save-row">
      <input type="text" id="tpl-save-name" placeholder="現在の状態をテンプレとして保存（名前を入力）">
      <button class="btn-save-tpl" onclick="saveCurrentAsTpl()">💾 保存</button>
    </div>
  </div>
</div>

<!-- ===== 詳細設定モーダル ===== -->
<div id="tpl-detail-modal" class="tpl-detail-overlay">
  <div class="tpl-detail-content">
    <div class="tpl-detail-header">
      <div style="display:flex;align-items:center">
        <h2 id="cfg-title">詳細設定</h2>
        <span class="tpl-genre-badge" id="cfg-genre-badge"></span>
      </div>
      <button class="btn-close-modal" onclick="closeCfgModal()">✕</button>
    </div>
    <div class="tpl-detail-body" id="cfg-body"></div>
    <div class="tpl-detail-footer">
      <button class="btn-cfg-back" onclick="closeCfgModal()">← 戻る</button>
      <button class="btn-cfg-apply" onclick="applyCfgToCanvas()">✅ キャンバスに反映</button>
    </div>
  </div>
</div>

<script>

// ── タブ切替
function switchTab(id,btn){
  ['zones','settings','output','saved'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===id?'':'none'});
  document.querySelectorAll('.side-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.dynamic-select').forEach(sel=>{
    const expand=()=>Array.from(sel.options).forEach(o=>{if(o.dataset.full)o.textContent=o.dataset.full});
    const shrink=()=>Array.from(sel.options).forEach(o=>{if(o.dataset.short)o.textContent=o.dataset.short});
    sel.addEventListener('mousedown',expand);sel.addEventListener('touchstart',expand,{passive:true});
    sel.addEventListener('focus',expand);sel.addEventListener('blur',shrink);sel.addEventListener('change',shrink);
    shrink();
  });
});
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const COLORS=['#5b7fff','#34d399','#f59e42','#f87171','#a78bfa','#38bdf8','#fb923c','#4ade80','#e879f9','#facc15'];
const DEF_NAMES=['メイン画像','見出し','サブコピー','商品','人物','背景','ロゴ','ボタン','装飾','その他'];
const FMT={A4v:{w:400,h:565,prompt:'portrait A4 vertical flyer layout'},A4h:{w:565,h:400,prompt:'landscape A4 horizontal layout'},B4v:{w:400,h:573,prompt:'portrait B4 vertical poster/flyer layout'},B4h:{w:573,h:400,prompt:'landscape B4 horizontal poster/flyer layout'},poster:{w:400,h:565,prompt:'large vertical poster layout'},sq:{w:460,h:460,prompt:'square 1:1 social media post'},wide:{w:580,h:326,prompt:'wide 16:9 horizontal banner'},story:{w:320,h:568,prompt:'vertical 9:16 stories format'},x_header:{w:600,h:200,prompt:'ultra-wide 3:1 header banner layout'},yt_thumb:{w:560,h:315,prompt:'16:9 YouTube thumbnail layout'},card:{w:550,h:330,prompt:'horizontal business card layout'}};
const STYLE_MAP={photorealistic:'photorealistic hyperrealistic commercial photography, photo-quality image',minimalist:'minimalist design, generous white space, clean and simple composition',flat:'flat design illustration, bold colors, no shadows or gradients, 2D graphic style',anime:'anime style illustration, Japanese anime aesthetic, hand-drawn look',vintage:'vintage retro poster style, aged texture, nostalgic warm feel',modern:'modern contemporary design, bold geometric shapes, sleek and stylish',watercolor:'soft watercolor illustration, artistic handcrafted brushstroke style',luxury:'luxury premium advertising design, refined typography, elegant materials, upscale finish',pop:'bright pop advertising style, energetic shapes, playful commercial design',editorial:'editorial magazine layout, polished art direction, strong typography hierarchy',cinematic:'cinematic key visual, dramatic commercial composition, movie-poster quality',corporate:'clean corporate brochure style, trustworthy, professional, organized information design',kawaii:'kawaii cute Japanese design, soft friendly shapes, cheerful and approachable',bold_typography:'bold typography-led poster design, large impactful lettering, strong graphic layout',collage:'modern collage design, layered cutout visuals, dynamic mixed-media composition',line_art:'clean line-art illustration, simple icons, airy hand-drawn accents',isometric:'isometric illustration style, tidy 3D-like vector composition',premium_photo:'premium product photography advertisement, crisp detail, catalog-quality finish'};
const LIGHT_MAP={natural:'natural daylight, soft shadows, bright and airy atmosphere',studio:'professional studio lighting, clean white background, sharp crisp detail',golden:'golden hour lighting, warm orange glow, long soft shadows',soft:'soft diffused light, gentle shadows, warm inviting atmosphere',dramatic:'dramatic chiaroscuro lighting, deep shadows, strong highlights, high contrast',backlit:'beautiful backlight, glowing rim light, luminous edges',neon:'colorful neon lighting, night commercial atmosphere, vivid glow',overcast:'soft overcast daylight, even gentle shadows, natural realism',spotlight:'focused spotlight lighting, attention on the hero subject',high_key:'high-key bright lighting, clean white airy commercial look',low_key:'low-key moody lighting, deep blacks and selective highlights'};
const COLOR_MAP={warm:'warm color palette - oranges, reds and yellows, energetic and inviting',cool:'cool color palette - blues and teals, calm and trustworthy',pastel:'soft pastel colors, light dreamy palette, gentle and cute',mono:'black and white monochrome, elegant and sophisticated',vivid:'vibrant vivid colors, highly saturated, bold and eye-catching',contrast:'high contrast color scheme, bold and striking visual impact',earth:'earth-tone palette, greens, clay, natural beige accents, organic and calm',japanese:'Japanese seasonal color harmony, refined traditional accents, balanced and tasteful',luxury_gold:'black, white, and gold premium palette, elegant and expensive feel',fresh:'fresh clean palette, white space with green and light blue accents',cute:'cute candy-color palette, cheerful pink, yellow, mint, and sky blue accents',tech:'modern tech palette, electric cyan, blue, graphite, and crisp white',natural_food:'natural food palette, appetizing reds, greens, cream, and warm highlights'};
const COMP_MAP={eye_level:'eye-level shot, standard perspective',close_up:'close-up shot, detailed focus on the main subject',wide_angle:'wide-angle shot, expansive view',high_angle:'high-angle shot, birds-eye view',low_angle:'low-angle shot, heroic perspective',symmetry:'symmetrical centered composition, balanced and orderly',diagonal:'dynamic diagonal composition, energetic movement across the layout',rule_thirds:'rule-of-thirds composition, natural focal placement',top_down:'top-down flat lay composition, clear arrangement of objects',split_layout:'split layout composition, distinct information blocks and image blocks',hero_center:'large centered hero subject with supporting text around it',grid_layout:'structured grid layout, many small information modules aligned cleanly'};
const CAMERA_MAP={dslr:'shot on DSLR, beautiful bokeh, shallow depth of field',polaroid:'polaroid style, instant camera aesthetic, vintage border',film:'35mm film photography, natural film grain',drone:'drone photography, aerial view',smartphone:'modern smartphone photography, natural everyday realism',macro:'macro lens photography, crisp close detail and shallow depth',wide_lens:'wide lens commercial photography, spacious perspective',portrait_lens:'85mm portrait lens look, flattering compression and soft background',product_lens:'product photography lens, distortion-free, precise detail',tilt_shift:'tilt-shift lens look, miniature-like selective focus'};
const EXTRA_SELECT_OPTIONS={
  style:[['luxury','高級感','高級感 - 上質・洗練・プレミアム'],['pop','ポップ','ポップ - 明るい・楽しい・目立つ'],['editorial','雑誌風','雑誌風 - おしゃれな誌面レイアウト'],['cinematic','映画風','映画風 - ドラマチックなキービジュアル'],['corporate','企業風','企業風 - 信頼感・整理された案内'],['kawaii','かわいい','かわいい - 親しみやすく柔らかい'],['bold_typography','文字主役','文字主役 - 大きな文字で強く見せる'],['collage','コラージュ','コラージュ - 切り抜きや重ねを活かす'],['line_art','線画','線画 - シンプルな手描き線'],['isometric','アイソメ','アイソメ - 立体風イラスト'],['premium_photo','商品写真風','商品写真風 - カタログ品質の写真広告']],
  lighting:[['backlit','逆光','逆光 - ふちが光る印象的な光'],['neon','ネオン','ネオン - 夜・発光・派手'],['overcast','曇天自然光','曇天自然光 - 影が柔らかく自然'],['spotlight','スポット','スポット - 主役に光を集中'],['high_key','明るめ','明るめ - 白く清潔な広告感'],['low_key','暗め','暗め - 大人っぽく重厚']],

function pushMultilineField(lines,label,value,indent='',exact=false){
  const text=String(value||'').trim();
  if(!text)return;
  const hasBreak=/\r?\n/.test(text);
  if(hasBreak){
    lines.push(indent+label+':');
    lines.push(indent+'"""');
    text.split(/\r?\n/).forEach(line=>lines.push(indent+line));
    lines.push(indent+'"""');
    lines.push(indent+(exact?'Preserve the line breaks above exactly when rendering this text.':'Preserve the manual line breaks above as part of the instruction.'));
  }else{
    lines.push(indent+label+': '+(exact?'"'+text+'"':text)+(exact?' (Must be rendered perfectly without typos or mutations)':''));
  }
}
function generate(){
  const fmtKey=document.getElementById('fmt').value;
  const styleVal=document.getElementById('style').value;
  const lightVal=document.getElementById('lighting').value;
  const colorVal=document.getElementById('color').value;
  const compVal=document.getElementById('composition').value;
  const camVal=document.getElementById('camera').value;
  const mood=document.getElementById('mood').value.trim();
  const lines=[];
  lines.push('=== ADVERTISEMENT IMAGE GENERATION PROMPT ===');lines.push('');
  lines.push('[FORMAT]');lines.push(FMT[fmtKey].prompt);lines.push('');
  lines.push('[STYLE & ATMOSPHERE]');
  lines.push(STYLE_MAP[styleVal]);lines.push(LIGHT_MAP[lightVal]);lines.push(COLOR_MAP[colorVal]);
  if(compVal)lines.push(COMP_MAP[compVal]);
  if(camVal)lines.push(CAMERA_MAP[camVal]);
  pushMultilineField(lines,'Target / mood',mood);
  lines.push('');
  const hasPhotos=zones.some(z=>z._photoName);
  if(hasPhotos){
    // ── 写真使用の強制指示（冒頭に置くことでGPTに最優先で認識させる）
    lines.push('[!! CRITICAL PHOTO USAGE INSTRUCTIONS !!]');
    lines.push('You have been provided with actual photo files in a ZIP archive.');
    lines.push('These are REAL photographs taken specifically for this advertisement.');
    lines.push('Treat every provided image as a mandatory source asset, not as inspiration or a loose reference.');
    lines.push('Preserve the people, products, objects, colors, composition, and identity shown in each uploaded image.');
    lines.push('');
    lines.push('ABSOLUTE RULES — violation of any of these is unacceptable:');
    lines.push('  1. DO NOT generate, illustrate, or AI-create any image for zones that have a specified photo file.');
    lines.push('  2. USE the provided photo files EXACTLY as supplied — do not alter, filter, or replace them.');
    lines.push('  3. COMPOSITE each photo directly into its designated zone in the layout.');
    lines.push('  4. The photos must appear as real photographs embedded in the final advertisement.');
    lines.push('  5. If a zone says [USE PHOTO FILE: "filename.jpg"], that file MUST appear in that exact position.');
    lines.push('  6. Do not reinterpret, restyle, redraw, upscale into a different look, swap faces, change products, or invent substitute images.');
    lines.push('  7. Cropping is allowed only when necessary to fit the assigned zone; keep the main subject recognizable and unchanged.');
    lines.push('');
    lines.push('Photo file assignments:');
    zones.forEach((z,i)=>{
      if(z._photoName) lines.push('  [zone "'+(z.name||DEF_NAMES[i]||'Zone '+(i+1))+'"] <-- USE PHOTO FILE: "'+z._photoName+'" (DO NOT substitute or regenerate)');
    });
    lines.push('');
  }
  if(zones.length){
    lines.push('[LAYOUT ZONES]');
    lines.push('The image is divided into the following distinct visual zones.');
    lines.push('DO NOT render any percentage numbers or dimension labels.');lines.push('');
    const emph=zones.filter(z=>z.emphasized);
    if(emph.length){
      lines.push('* EMPHASIZED ZONES (most prominent visual focus):');
      emph.forEach(z=>{
        const i=zones.indexOf(z);const nm=z.name||DEF_NAMES[i]||'Zone '+(i+1);
        lines.push('  - "'+nm+'" - placed at the '+POS_LABEL(z)+', '+SIZE_LABEL(z));
        if(z._photoName){
          lines.push('    [USE PHOTO FILE: "'+z._photoName+'"] — embed this real photograph directly. DO NOT generate a new image here.');
        } else if(z.image_prompt){
          lines.push('    Image/Subject: '+z.image_prompt);
        }
        pushMultilineField(lines,'Exact Text to Render',z.heading,'    ',true);
        pushMultilineField(lines,'Details',z.description,'    ');
        pushMultilineField(lines,'Context/Note',z.context,'    ');
      });lines.push('');
    }
    const norm2=zones.filter(z=>!z.emphasized);
    if(norm2.length){
      lines.push('* SUPPORTING ZONES:');
      norm2.forEach(z=>{
        const i=zones.indexOf(z);const nm=z.name||DEF_NAMES[i]||'Zone '+(i+1);
        lines.push('  - "'+nm+'" - placed at the '+POS_LABEL(z)+', '+SIZE_LABEL(z));
        if(z._photoName){
          lines.push('    [USE PHOTO FILE: "'+z._photoName+'"] — embed this real photograph directly. DO NOT generate a new image here.');
        } else if(z.image_prompt){
          lines.push('    Image/Subject: '+z.image_prompt);
        }
        pushMultilineField(lines,'Exact Text to Render',z.heading,'    ',true);
        pushMultilineField(lines,'Details',z.description,'    ');
        pushMultilineField(lines,'Context/Note',z.context,'    ');
      });
    }
    if(zones.some(z=>z.heading)){lines.push('');lines.push('[TYPOGRAPHY & TEXT RENDERING]');lines.push('CRITICAL INSTRUCTION: The specified text MUST be rendered exactly as requested.');lines.push('Manual line breaks inside Exact Text to Render blocks are intentional and must be preserved.');lines.push('Ensure all typography is crisp, legible, and perfectly formed.')}
  }else{lines.push('[LAYOUT]');lines.push('Balanced composition with clear space.')}
  lines.push('');
  if(hasPhotos){
    lines.push('[FINAL REMINDER — PHOTO USAGE]');
    lines.push('The ZIP archive contains the actual photos listed above.');
    lines.push('Every zone marked [USE PHOTO FILE] must show that exact photograph in the final output.');
    lines.push('Treat each photo file as a mandatory asset, not a reference or inspiration.');
    lines.push('');
  }
  lines.push('[QUALITY]');lines.push('High resolution 4K, print quality, sharp focus, ultra detailed, professional commercial photography.');
  document.getElementById('output').textContent=lines.join('\n');
  document.getElementById('output-wrap').style.display='block';
  const zipBtn=document.getElementById('btn-zip');
  zipBtn.style.display=hasPhotos?'':'none';
  document.querySelectorAll('.side-tab').forEach((b,idx)=>{b.classList.toggle('active',idx===2)});
  ['zones','settings','output','saved'].forEach((t,idx)=>{document.getElementById('tab-'+t).style.display=idx===2?'':'none'});
}

function getSavedWorks(){try{return JSON.parse(localStorage.getItem('prompt_canvas_saves')||'[]')}catch{return []}}
function setSavedWorks(items){localStorage.setItem('prompt_canvas_saves',JSON.stringify(items))}
function currentSettings(){return {fmt:document.getElementById('fmt').value,style:document.getElementById('style').value,lighting:document.getElementById('lighting').value,color:document.getElementById('color').value,composition:document.getElementById('composition').value,camera:document.getElementById('camera').value,mood:document.getElementById('mood').value}}
function applySettings(s){if(!s)return;['fmt','style','lighting','color','composition','camera','mood'].forEach(k=>{const el=document.getElementById(k);if(el&&s[k]!==undefined)el.value=s[k]});resizeCanvas()}
function saveCurrentWork(){
  const nameEl=document.getElementById('save-name');
  const name=(nameEl?.value||'').trim()||'保存 '+new Date().toLocaleString();
  const prompt=document.getElementById('output')?.textContent||'';
  const items=getSavedWorks();
  items.unshift({id:'save_'+Date.now(),name,created:new Date().toISOString(),settings:currentSettings(),zones:zones.map(z=>({...z,_imgEl:null})),prompt});
  setSavedWorks(items.slice(0,60));
  if(nameEl)nameEl.value='';renderSavedList();alert('保存しました');
}
function saveCurrentWorkFromHeader(){
  const defaultName='保存 '+new Date().toLocaleString();
  const name=prompt('保存名を入力してください',defaultName);
  if(name===null)return;
  const nameEl=document.getElementById('save-name');
  if(nameEl)nameEl.value=(name.trim()||defaultName);
  saveCurrentWork();
}
function renderSavedList(){
  const el=document.getElementById('saved-list');if(!el)return;
  const items=getSavedWorks();
  if(!items.length){el.innerHTML='<div class="empty-hint">保存履歴はまだありません</div>';return}
  el.innerHTML=items.map(item=>`<div class="saved-card"><div class="saved-card-title">${escapeHtml(item.name)}</div><div class="saved-card-meta">${new Date(item.created).toLocaleString()} / ${(item.zones||[]).length}領域 / ${item.prompt?'プロンプトあり':'プロンプト未生成'}</div><div class="saved-card-actions"><button onclick="loadSavedWork('${item.id}')">読み込み</button><button onclick="copySavedPrompt('${item.id}')">プロンプトコピー</button><button onclick="deleteSavedWork('${item.id}')" class="danger">削除</button></div></div>`).join('');
}
function loadSavedWork(id){
  const item=getSavedWorks().find(x=>x.id===id);if(!item)return;
  if(zones.length&&!confirm('現在の領域を置き換えて保存データを読み込みますか？'))return;
  applySettings(item.settings);zones=normalizeZonesToCanvas((item.zones||[]).map(z=>({...z,_imgEl:null})));draw();renderList();
  if(item.prompt){document.getElementById('output').textContent=item.prompt;document.getElementById('output-wrap').style.display='block'}
  switchTab('zones',document.querySelector('.side-tab'));
}
function copySavedPrompt(id){const item=getSavedWorks().find(x=>x.id===id);if(!item||!item.prompt){alert('保存されたプロンプトがありません');return}navigator.clipboard.writeText(item.prompt).then(()=>alert('プロンプトをコピーしました'))}
function deleteSavedWork(id){if(!confirm('この保存履歴を削除しますか？'))return;setSavedWorks(getSavedWorks().filter(x=>x.id!==id));renderSavedList()}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function copyPrompt(){
  const t=document.getElementById('output').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const btn=document.querySelector('.btn-copy-prim');
    btn.textContent='✓ コピー済み';setTimeout(()=>{btn.textContent='📋 コピー'},1800);
  });
}
async function downloadZip(){
  const photos=zones.filter(z=>z._photoData&&z._photoName);
  if(!photos.length){alert('写真がアップロードされていません');return}
  const btn=document.getElementById('btn-zip');
  const status=document.getElementById('zip-status');
  btn.textContent='⏳ 作成中...';btn.disabled=true;
  try{
    if(!window.JSZip){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)});
    }
    const zip=new JSZip();
    for(const z of photos){const base64=z._photoData.split(',')[1];zip.file(z._photoName,base64,{base64:true})}
    const blob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ad_photos.zip';a.click();
    status.innerHTML='<div class="zip-badge">✅ '+photos.length+'枚の写真をZIPにまとめました</div>';
    setTimeout(()=>{status.innerHTML=''},4000);
  }catch(e){alert('ZIPの作成に失敗: '+e.message)}
  btn.textContent='📦 写真をZIPでダウンロード';btn.disabled=false;
}

function makeFineZone(x,y,w,h,name,heading='',description='',emphasized=false){
  return {x,y,w,h,name,heading,description,image_prompt:'',context:'fine editable template region',emphasized,collapsed:true,showDetails:false,_photoName:null,_photoData:null,_imgEl:null};
}
function addFineTemplateZones(tpl){
  if(!tpl||!Array.isArray(tpl.zones))return;
  const targetMin=20;
  if(tpl.zones.length>=targetMin)return;
  const maxX=Math.max(400,...tpl.zones.map(z=>z.x+z.w));
  const maxY=Math.max(565,...tpl.zones.map(z=>z.y+z.h));
  const hasName=name=>tpl.zones.some(z=>z.name===name);
  const add=z=>{if(tpl.zones.length<targetMin&&!hasName(z.name))tpl.zones.push(z)};
  const w=maxX,h=maxY;
  add(makeFineZone(Math.max(8,w-92),8,84,28,'ロゴ/ブランド','ロゴ・ブランド名'));
  add(makeFineZone(0,0,Math.max(8,Math.round(w*.025)),h,'左アクセント線',''));

// ── ジャンル一覧
const GENRES = ['すべて', ...new Set(BUILTIN_TEMPLATES.map(t=>t.genre))];

// ── ユーザー保存テンプレ
function loadUserTpls(){
  try{ return JSON.parse(localStorage.getItem('kaimei_tpls')||'[]'); }catch{return []}
}
function saveUserTpls(arr){localStorage.setItem('kaimei_tpls', JSON.stringify(arr))}

// ── テンプレモーダル開閉
let tplActiveGenre = 'すべて';
function openTplModal(){
  document.getElementById('tpl-modal').style.display='flex';
  renderTplTabs();
  renderTplGrid();
}
function closeTplModal(){
  document.getElementById('tpl-modal').style.display='none';
}

function renderTplTabs(){
  const userTpls = loadUserTpls();
  const genres = [...GENRES];
  if(userTpls.length) genres.push('💾 保存済み');
  document.getElementById('tpl-tabs').innerHTML = genres.map(g=>
    `<button class="tpl-tab${tplActiveGenre===g?' active':''}" onclick="switchTplTab('${g}')">${g}</button>`
  ).join('');
}

function switchTplTab(genre){
  tplActiveGenre = genre;
  renderTplTabs();
  renderTplGrid();
}

function renderTplGrid(){
  const userTpls = loadUserTpls();
  let items;
  if(tplActiveGenre === '💾 保存済み'){
    items = userTpls.map(t=>({...t, _user:true}));
  } else if(tplActiveGenre === 'すべて'){
    items = [...BUILTIN_TEMPLATES, ...userTpls.map(t=>({...t, _user:true}))];
  } else {
    items = BUILTIN_TEMPLATES.filter(t=>t.genre===tplActiveGenre);
    if(!items.length && tplActiveGenre !== '💾 保存済み'){
      items = userTpls.filter(t=>t.genre===tplActiveGenre).map(t=>({...t, _user:true}));
    }
  }

  const grid = document.getElementById('tpl-grid');
  if(!items.length){
    grid.innerHTML = '<div class="no-tpl-hint">テンプレートがありません</div>';
    return;
  }
  grid.innerHTML = items.map((t,idx)=>`
    <div class="tpl-card${t._user?' user-saved':''}" onclick="applyTemplate('${t.id||'user_'+idx}', ${t._user?1:0})">
      <div class="tc-genre">${t._user?'💾 保存済み':t.genre}${t._user?`<button class="tpl-del-btn" onclick="event.stopPropagation();deleteUserTpl('${t.id}')">🗑削除</button>`:''}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc||''}</div>
      <div class="tc-zones">📐 ${t.zones.length} 領域</div>
    </div>`).join('');
}

function applyTemplate(id, isUser){
  let tpl;
  if(isUser){
    tpl = loadUserTpls().find(t=>t.id===id);
  } else {
    tpl = BUILTIN_TEMPLATES.find(t=>t.id===id);
  }
  if(!tpl) return;
  // ユーザー保存テンプレはschemaなし→直接適用
  if(isUser || !tpl.schema){
    const ok = zones.length===0 || confirm('現在の領域をすべて削除してテンプレートを読み込みますか？');
    if(!ok) return;
    zones = normalizeZonesToCanvas(tpl.zones.map(z=>({...z}))); 
    setMode('move'); draw(); renderList(); closeTplModal();
    return;
  }
  // schema付き→詳細設定画面へ
  openCfgModal(tpl);
}

// ── 詳細設定モーダル
let _cfgTpl = null;

function openCfgModal(tpl){
  _cfgTpl = tpl;
  document.getElementById('cfg-title').textContent = tpl.name;
  document.getElementById('cfg-genre-badge').textContent = tpl.genre;
  renderCfgBody(tpl);
  document.getElementById('tpl-detail-modal').style.display='flex';
}

function closeCfgModal(){
  document.getElementById('tpl-detail-modal').style.display='none';
}

function renderCfgBody(tpl){
  const schema = tpl.schema;
  let html = '';

  html += `<div class="cfg-preview-bar">📐 ${tpl.zones.length} 領域のテンプレート &nbsp;|&nbsp; ${tpl.desc}</div>`;

  schema.sections.forEach(sec => {
    html += `<div class="cfg-section">`;
    html += `<div class="cfg-section-title">${sec.title}</div>`;

    sec.fields.forEach(f => {
      const val = f.default || '';
      const emphChecked = f.emphasized ? 'checked' : '';

      if(f.type === 'text'){
        html += `<div class="cfg-field">
          <label>${f.label}</label>
          <textarea id="cfg-f-${f.key}" rows="${f.rows||2}" placeholder="${f.placeholder||''}">${escapeHtml(val)}</textarea>
          ${f.canEmphasize ? emphToggle(f.key, f.emphasized) : ''}
        </div>`;
      } else if(f.type === 'textarea'){
        html += `<div class="cfg-field">
          <label>${f.label}</label>
          <textarea id="cfg-f-${f.key}" rows="${f.rows||2}" placeholder="${f.placeholder||''}">${val}</textarea>
          ${f.canEmphasize ? emphToggle(f.key, f.emphasized) : ''}
        </div>`;
      } else if(f.type === 'row'){
        html += `<div class="cfg-row">`;
        f.cols.forEach(col => {
          html += `<div class="cfg-field">
            <label>${col.label}</label>
            <textarea id="cfg-f-${col.key}" rows="${col.rows||2}" placeholder="${col.placeholder||''}">${escapeHtml(col.default||'')}</textarea>
          </div>`;
        });
        html += `</div>`;
      } else if(f.type === 'dynlist'){
        html += `<div class="cfg-field">
          <label>${f.label} <span style="color:#aaa;font-weight:400">（追加・削除・強調が可能）</span></label>
          <div class="dyn-list" id="dynlist-${f.key}">`;
        const items = f.defaults || [''];
        items.forEach((item, idx) => {
          html += dynItemHTML(f.key, idx, item, f.subfield, f.canEmphasize, item._emph||false);
        });
        html += `</div>
          <button class="dyn-add-btn" onclick="addDynItem('${f.key}','${f.subfield||''}','${f.canEmphasize||false}')">＋ ${f.addLabel||'追加'}</button>
        </div>`;
      }
    });
    html += `</div>`;
  });

  document.getElementById('cfg-body').innerHTML = html;
}

function emphToggle(key, checked){
  return `<div class="cfg-emph-row">
    <label class="cfg-emph-toggle">
      <input type="checkbox" id="cfg-emph-${key}" onchange="updateEmphLabel('${key}')" ${checked?'checked':''}>
      <span class="cfg-emph-slider"></span>
    </label>
    <span class="cfg-emph-label${checked?' on':''}" id="cfg-emph-lbl-${key}">強調エリアにする</span>
  </div>`;
}

function updateEmphLabel(key){
  const cb = document.getElementById('cfg-emph-'+key);
  const lbl = document.getElementById('cfg-emph-lbl-'+key);
  if(cb.checked){ lbl.className='cfg-emph-label on'; lbl.textContent='★ 強調エリア'; }
  else { lbl.className='cfg-emph-label'; lbl.textContent='強調エリアにする'; }
}

let _dynCounters = {};
function dynItemHTML(key, idx, item, subfield, canEmph, isEmph){
  const mainVal = typeof item === 'object' ? (item.heading||'') : item;
  const subVal  = typeof item === 'object' ? (item.desc||'') : '';
  return `<div class="dyn-item${isEmph?' emphasized-item':''}" id="dyn-${key}-${idx}">
    <span class="dyn-item-num">${idx+1}</span>
    <div class="dyn-item-fields">
      <textarea rows="2" placeholder="見出し・タイトル" data-dyn="${key}" data-idx="${idx}" data-role="heading">${escapeHtml(mainVal)}</textarea>
      ${subfield ? `<textarea rows="2" placeholder="${subfield}" data-dyn="${key}" data-idx="${idx}" data-role="desc">${escapeHtml(subVal)}</textarea>` : ''}
    </div>
    <div class="dyn-item-controls">
      ${canEmph ? `<button class="dyn-emph-btn${isEmph?' on':''}" onclick="toggleDynEmph('${key}',${idx},this)" title="強調">★</button>` : ''}
      <button class="dyn-del-btn" onclick="delDynItem('${key}',${idx})" title="削除">×</button>
    </div>
  </div>`;
}

function addDynItem(key, subfield, canEmph){
  const list = document.getElementById('dynlist-'+key);
  const idx = list.children.length;
  const div = document.createElement('div');
  div.innerHTML = dynItemHTML(key, idx, '', subfield==='false'?'':subfield, canEmph==='false'?false:canEmph, false);
  list.appendChild(div.firstElementChild);
  // renumber
  renumberDynList(key);
}

function delDynItem(key, idx){
  const item = document.getElementById(`dyn-${key}-${idx}`);
  if(item) item.remove();
  renumberDynList(key);
}

function renumberDynList(key){
  const list = document.getElementById('dynlist-'+key);
  if(!list) return;
  Array.from(list.children).forEach((el,i)=>{
    el.id = `dyn-${key}-${i}`;
    const num = el.querySelector('.dyn-item-num');
    if(num) num.textContent = i+1;
    // update data-idx
    el.querySelectorAll('[data-idx]').forEach(inp=>inp.dataset.idx=i);
    // update onclick
    const delBtn = el.querySelector('.dyn-del-btn');
    if(delBtn) delBtn.setAttribute('onclick',`delDynItem('${key}',${i})`);
    const emphBtn = el.querySelector('.dyn-emph-btn');
    if(emphBtn) emphBtn.setAttribute('onclick',`toggleDynEmph('${key}',${i},this)`);
  });
}

function toggleDynEmph(key, idx, btn){
  btn.classList.toggle('on');
  const item = document.getElementById(`dyn-${key}-${idx}`);
  if(item) item.classList.toggle('emphasized-item');
}

function getDynListData(key){
  const list = document.getElementById('dynlist-'+key);
  if(!list) return [];
  return Array.from(list.children).map(el => {
    const headingEl = el.querySelector('[data-role="heading"]');
    const descEl    = el.querySelector('[data-role="desc"]');
    const emphBtn   = el.querySelector('.dyn-emph-btn');
    return {
      heading: headingEl ? headingEl.value.trim() : '',
      desc:    descEl    ? descEl.value.trim()    : '',
      emph:    emphBtn   ? emphBtn.classList.contains('on') : false
    };
  });
}

function getCfgValue(key){ const el=document.getElementById('cfg-f-'+key); return el?el.value.trim():''; }
function getCfgEmph(key){ const el=document.getElementById('cfg-emph-'+key); return el?el.checked:false; }

// ── 設定をゾーンに反映
function applyCfgToCanvas(){
  if(!_cfgTpl) return;
  const ok = zones.length===0 || confirm('現在の領域をすべて削除してテンプレートを読み込みますか？');
  if(!ok) return;

  // ── ベースゾーンをコピー
  const newZones = _cfgTpl.zones.map(z=>({...z}));
  const schema = _cfgTpl.schema;

  // ── dynlist ごとに「何件追加/削除したか」を記録（後続ゾーンのyシフト用）
  // key: startZoneIndex, value: delta (追加した数 - 削除した数)
  const yShiftMap = []; // [{afterIdx, dy}] 後続ゾーンのyシフト指示

  schema.sections.forEach(sec => {
    sec.fields.forEach(f => {
      if(f.type === 'text' || f.type === 'textarea'){
        const val = getCfgValue(f.key);
        const emph = f.canEmphasize ? getCfgEmph(f.key) : null;
        if(f.zoneIndex !== undefined && f.zoneIndex < newZones.length){
          if(val) newZones[f.zoneIndex].heading = val;
          if(emph !== null) newZones[f.zoneIndex].emphasized = emph;
        }
        if(f.zoneIndexDesc !== undefined && f.zoneIndexDesc < newZones.length && val){
          newZones[f.zoneIndexDesc].description = val;
        }
      } else if(f.type === 'row'){
        f.cols.forEach(col => {
          const val = getCfgValue(col.key);
          if(val && col.zoneIndex !== undefined && col.zoneIndex < newZones.length)
            newZones[col.zoneIndex].heading = val;
          if(val && col.zoneIndexDesc !== undefined && col.zoneIndexDesc < newZones.length)
            newZones[col.zoneIndexDesc].description = val;
        });
      } else if(f.type === 'dynlist'){
        const items = getDynListData(f.key);
        if(!items.length) return;

        const startIdx = f.startZoneIndex;
        const tplCount = f.tplCount || 1;
        const newCount = items.length;

        // ── テンプレ内の対象ゾーン群のバウンディングボックスを取得
        const tplGroup = newZones.slice(startIdx, startIdx + tplCount);
        if(!tplGroup.length) return;

        const bbox = {
          x: Math.min(...tplGroup.map(z=>z.x)),
          y: Math.min(...tplGroup.map(z=>z.y)),
          x2: Math.max(...tplGroup.map(z=>z.x+z.w)),
          y2: Math.max(...tplGroup.map(z=>z.y+z.h))
        };
        bbox.w = bbox.x2 - bbox.x;
        bbox.h = bbox.y2 - bbox.y;

        // ── テンプレのレイアウト方向を判断（横並び or 縦並び）
        // y座標のばらつき vs x座標のばらつきで判定
        const ySpread = Math.max(...tplGroup.map(z=>z.y)) - Math.min(...tplGroup.map(z=>z.y));
        const xSpread = Math.max(...tplGroup.map(z=>z.x)) - Math.min(...tplGroup.map(z=>z.x));
        const isHorizontal = xSpread > ySpread; // 横並びか縦並びか

        // ── 1件あたりのゾーンサイズを計算
        const refZone = tplGroup[0];
        const GAP = 4;

        let newGroupZones;
        if(isHorizontal){
          // 横並び: 行数を計算して折り返し
          // テンプレの列数を基準に、newCountを収める行数を決める
          const tplCols = tplGroup.length; // テンプレの横並び数
          const itemW = refZone.w;
          const itemH = refZone.h;
          // 何列に並べるか: キャンバス幅に収まる最大列数
          const maxCols = Math.max(1, Math.floor((bbox.w + GAP) / (itemW + GAP)));
          const cols = Math.min(newCount, maxCols);
          const rows = Math.ceil(newCount / cols);
          // bboxの高さを行数に合わせて伸縮
          const newBboxH = rows * itemH + (rows - 1) * GAP;

          newGroupZones = items.map((item, i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            // 均等割り: bbox内でcolsを等幅に分割
            const cellW = Math.floor((bbox.w - (cols-1)*GAP) / cols);
            const cellH = itemH;
            return {
              ...refZone,
              x: bbox.x + col * (cellW + GAP),
              y: bbox.y + row * (cellH + GAP),
              w: cellW,
              h: cellH,
              name: item.heading || refZone.name,
              heading: item.heading,
              description: item.desc,
              emphasized: item.emph,
              collapsed: false,
              showDetails: false,
              _photoName: null, _photoData: null, _imgEl: null
            };
          });

          // yシフト量 = 新しいbboxH - 元のbboxH
          const dy = newBboxH - bbox.h;
          if(dy !== 0) yShiftMap.push({afterY: bbox.y2, dy});

        } else {
          // 縦並び: 均等に縦分割
          const itemW = refZone.w;
          const newItemH = Math.max(20, Math.floor((bbox.h - (newCount-1)*GAP) / newCount));

          newGroupZones = items.map((item, i) => ({
            ...refZone,
            x: bbox.x,
            y: bbox.y + i * (newItemH + GAP),
            w: itemW,
            h: newItemH,
            name: item.heading || refZone.name,
            heading: item.heading,
            description: item.desc,
            emphasized: item.emph,
            collapsed: false,
            showDetails: false,
            _photoName: null, _photoData: null, _imgEl: null
          }));
          // 縦並びは bbox.h に収まるよう均等割りなのでdyは0
        }

        // ── 元のtplGroupをnewGroupZonesで置換
        newZones.splice(startIdx, tplCount, ...newGroupZones);
      }
    });
  });

  // ── yシフト: dynlist の増減で生じた空白/重なりを後続ゾーンに伝播
  yShiftMap.forEach(({afterY, dy}) => {
    newZones.forEach(z => {
      if(z.y >= afterY - 1) z.y += dy;
    });
  });

  zones = normalizeZonesToCanvas(newZones); 
  setMode('move');
  draw();
  renderList();
  closeCfgModal();
  closeTplModal();
}


function deleteUserTpl(id){
  const arr = loadUserTpls().filter(t=>t.id!==id);
  saveUserTpls(arr);
  renderTplTabs();
  renderTplGrid();
}

function saveCurrentAsTpl(){
  const name = document.getElementById('tpl-save-name').value.trim();
  if(!name){ alert('テンプレート名を入力してください'); return; }
  if(!zones.length){ alert('領域がありません'); return; }
  const arr = loadUserTpls();
  const id = 'user_' + Date.now();
  arr.push({id, name, desc:'自分で作成したテンプレート', genre:'カスタム', zones: zones.map(z=>({...z}))});
  saveUserTpls(arr);
  document.getElementById('tpl-save-name').value='';
  alert('✅ テンプレートを保存しました！');
  renderTplTabs();
  renderTplGrid();
}

// ── 全折りたたみ
function collapseAll(){
  zones.forEach(z=>z.collapsed=true);
  renderList();
}
